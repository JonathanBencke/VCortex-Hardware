<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>V-Cortex Circuit Viewer v1.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:system-ui,monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#header{background:#161b22;border-bottom:1px solid #30363d;padding:8px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:10}
#header h1{font-size:14px;font-weight:600;color:#58a6ff}
#header span{font-size:11px;color:#8b949e}
.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}
.btn:hover{background:#30363d}
#main{display:flex;flex:1;overflow:hidden}
#canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab}
#canvas-wrap.panning{cursor:grabbing}
#circuit{display:block;width:100%;height:100%}
#detail-panel{width:280px;background:#161b22;border-left:1px solid #30363d;padding:14px;overflow-y:auto;flex-shrink:0;font-size:12px}
#detail-panel h2{font-size:13px;color:#58a6ff;margin-bottom:10px;border-bottom:1px solid #30363d;padding-bottom:6px}
#detail-panel .empty{color:#8b949e;font-style:italic}
.detail-ref{font-size:20px;font-weight:700;color:#f0f6fc;margin-bottom:4px}
.detail-value{font-size:13px;color:#e6edf3;margin-bottom:8px}
.detail-mpn{font-size:11px;color:#8b949e;font-family:monospace;margin-bottom:4px}
.detail-lcsc{font-size:11px;color:#58a6ff;font-family:monospace;margin-bottom:4px}
.detail-pkg{font-size:11px;color:#8b949e;margin-bottom:4px}
.detail-desc{font-size:11px;color:#c9d1d9;margin-bottom:10px;line-height:1.5}
.detail-stage{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-bottom:10px}
.detail-conns h3{font-size:11px;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.conn-item{font-size:11px;padding:3px 0;border-bottom:1px solid #21262d;color:#c9d1d9}
.conn-item .net{color:#f0f6fc;font-weight:600}
.conn-item .peer{color:#58a6ff}
#legend{background:#161b22;border-top:1px solid #30363d;padding:6px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0;font-size:11px;color:#8b949e}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:12px;height:3px;border-radius:2px}
.stage-box rect{cursor:default}
.comp-group{cursor:pointer}
.comp-group:hover rect.comp-bg{filter:brightness(1.3)}
.comp-group.selected rect.comp-bg{stroke-width:2.5!important}
.conn-line{pointer-events:none}
</style>
</head>
<body>
<div id="header">
  <h1>V-Cortex Circuit Viewer</h1>
  <span>ESP32 OBD2 — 54 componentes / 6 stages</span>
  <div style="flex:1"></div>
  <button class="btn" onclick="resetView()">Reset View</button>
  <button class="btn" onclick="zoomIn()">Zoom +</button>
  <button class="btn" onclick="zoomOut()">Zoom −</button>
  <button class="btn" onclick="toggleConns()">Conexões</button>
</div>
<div id="main">
  <div id="canvas-wrap">
    <svg id="circuit" viewBox="0 0 1900 1160" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="detail-panel">
    <h2>Detalhes do Componente</h2>
    <div class="empty">Clique em um componente para ver detalhes</div>
  </div>
</div>
<div id="legend">
  <span>Nets:</span>
  <div class="leg-item"><div class="leg-dot" style="background:#e74c3c"></div> Power</div>
  <div class="leg-item"><div class="leg-dot" style="background:#58a6ff"></div> Signal</div>
  <div class="leg-item"><div class="leg-dot" style="background:#2ecc71;height:2px"></div> CAN Bus</div>

  <div class="leg-item"><div class="leg-dot" style="background:#636e72;height:1px"></div> GND</div>
  <span style="margin-left:auto;color:#6e7681">Scroll=zoom · Drag=pan · Click=detalhes</span>
</div>

const NET_COLORS = {power:'#e74c3c',signal:'#58a6ff',can:'#2ecc71',kline:'#f39c12',gnss:'#9b59b6',gnd:'#636e72'};

// Build component map with positions
const compMap = {};
const stageMap = {};

STAGES.forEach(stage => {
  const z = stage.zone;
  const cols = stage.cols;
  const cw = Math.floor((z.w - 20 - (cols-1)*10) / cols);
  const ch = 52;
  const gap = 10;
  const sx = z.x + 10;
  const sy = z.y + 38;
  let row = 0, col = 0;

  stage.components.forEach(comp => {
    if (comp.isHub) {
      compMap[comp.ref] = {
        ...comp, stage: stage.id, stageColor: stage.color,
        x: sx, y: sy,
        w: (cw + gap) * cols - gap,
        h: ch + 28,
        cx: sx + ((cw + gap) * cols - gap) / 2,
        cy: sy + (ch + 28) / 2,
      };
      row = 1; col = 0;
    } else {
      compMap[comp.ref] = {
        ...comp, stage: stage.id, stageColor: stage.color,
        x: sx + col * (cw + gap),
        y: sy + row * (ch + gap),
        w: cw, h: ch,
        cx: sx + col * (cw + gap) + cw / 2,
        cy: sy + row * (ch + gap) + ch / 2,
      };
      col++;
      if (col >= cols) { col = 0; row++; }
    }
  });
  stageMap[stage.id] = stage;
});

// Build connection index per component
const compConns = {};
CONNECTIONS.forEach(c => {
  if (!compConns[c.f]) compConns[c.f] = [];
  if (!compConns[c.t]) compConns[c.t] = [];
  compConns[c.f].push({...c, direction:'→', peer: c.t});
  compConns[c.t].push({...c, direction:'←', peer: c.f});
});

// SVG rendering
const svg = document.getElementById('circuit');
let showConns = true;

function renderAll() {
  svg.innerHTML = '';
  renderConnections();
  renderStages();
  renderComponents();
}

function renderStages() {
  STAGES.forEach(stage => {
    const z = stage.zone;
    const g = svgEl('g', {class:'stage-box'});
    g.appendChild(svgEl('rect', {
      x: z.x, y: z.y, width: z.w, height: z.h,
      rx: 8, fill: stage.bg,
      stroke: stage.color, 'stroke-width': 1.5, 'stroke-opacity': 0.6,
    }));
    const title = svgEl('text', {
      x: z.x + 12, y: z.y + 22,
      fill: stage.color, 'font-size': 12, 'font-weight': '600',
      'font-family': 'system-ui, sans-serif',
    });
    title.textContent = stage.name;
    g.appendChild(title);
    svg.appendChild(g);
  });
}

function renderComponents() {
  Object.values(compMap).forEach(comp => {
    const g = svgEl('g', {class:'comp-group', 'data-ref': comp.ref});
    g.addEventListener('click', () => showDetail(comp.ref));
    g.addEventListener('mouseenter', () => highlightConns(comp.ref, true));
    g.addEventListener('mouseleave', () => highlightConns(comp.ref, false));

    const isHub = comp.isHub;
    g.appendChild(svgEl('rect', {
      class:'comp-bg',
      x: comp.x, y: comp.y, width: comp.w, height: comp.h,
      rx: 4,
      fill: isHub ? '#0d1f3c' : '#1c2128',
      stroke: comp.stageColor,
      'stroke-width': isHub ? 2 : 1,
      'stroke-opacity': isHub ? 1 : 0.7,
    }));

    // Ref text
    const refT = svgEl('text', {
      x: comp.cx, y: comp.y + (isHub ? 26 : 17),
      'text-anchor': 'middle',
      fill: isHub ? '#58a6ff' : '#f0f6fc',
      'font-size': isHub ? 13 : 10,
      'font-weight': '700',
      'font-family': 'monospace',
    });
    refT.textContent = comp.ref;
    g.appendChild(refT);

    // Value text
    const valT = svgEl('text', {
      x: comp.cx, y: comp.y + (isHub ? 42 : 28),
      'text-anchor': 'middle',
      fill: '#8b949e',
      'font-size': isHub ? 10 : 8,
      'font-family': 'system-ui, sans-serif',
    });
    valT.textContent = truncate(comp.value, isHub ? 30 : 18);
    g.appendChild(valT);

    // LCSC code
    const lcscT = svgEl('text', {
      x: comp.cx, y: comp.y + (isHub ? 58 : 40),
      'text-anchor': 'middle',
      fill: '#58a6ff',
      'font-size': 7,
      'font-family': 'monospace',
    });
    lcscT.textContent = comp.lcsc;
    g.appendChild(lcscT);

    svg.appendChild(g);
  });
}

function renderConnections() {
  if (!showConns) return;
  const g = svgEl('g', {id:'conns-group', opacity: 0.6});
  CONNECTIONS.forEach((conn, i) => {
    const from = compMap[conn.f];
    const to = compMap[conn.t];
    if (!from || !to) return;
    const color = NET_COLORS[conn.type] || '#666';
    const isCross = from.stage !== to.stage;
    const sw = isCross ? 1.8 : 1.2;
    const dash = isCross ? '' : '4 3';
    const opacity = isCross ? 0.75 : 0.45;

    const x1 = from.cx, y1 = from.cy;
    const x2 = to.cx, y2 = to.cy;
    const dx = Math.abs(x2 - x1) * 0.45;
    const dy = Math.abs(y2 - y1) * 0.2;

    let cp1x, cp1y, cp2x, cp2y;
    if (Math.abs(x2 - x1) > Math.abs(y2 - y1)) {
      cp1x = x1 + dx; cp1y = y1;
      cp2x = x2 - dx; cp2y = y2;
    } else {
      cp1x = x1; cp1y = y1 + (y2-y1)*0.45;
      cp2x = x2; cp2y = y2 - (y2-y1)*0.45;
    }

    const path = svgEl('path', {
      class: 'conn-line',
      'data-conn': i,
      'data-from': conn.f,
      'data-to': conn.t,
      'data-net': conn.net,
      d: `M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`,
      stroke: color,
      'stroke-width': sw,
      'stroke-opacity': opacity,
      fill: 'none',
      'stroke-dasharray': dash,
    });
    g.appendChild(path);
  });
  svg.insertBefore(g, svg.firstChild);
}

function highlightConns(ref, on) {
  document.querySelectorAll('.conn-line').forEach(line => {
    const isRelated = line.dataset.from === ref || line.dataset.to === ref;
    if (on && isRelated) {
      line.setAttribute('stroke-opacity', '1');
      line.setAttribute('stroke-width', parseFloat(line.getAttribute('stroke-width')) * 1.8);
    } else if (on) {
      line.setAttribute('stroke-opacity', '0.1');
    } else {
      const isCross = compMap[line.dataset.from]?.stage !== compMap[line.dataset.to]?.stage;
      line.setAttribute('stroke-opacity', isCross ? '0.75' : '0.45');
      line.setAttribute('stroke-width', isCross ? '1.8' : '1.2');
    }
  });
}

function showDetail(ref) {
  const comp = compMap[ref];
  if (!comp) return;
  const stage = stageMap[comp.stage];
  const conns = compConns[ref] || [];
  const panel = document.getElementById('detail-panel');

  const connHTML = conns.map(c => {
    const dir = c.direction === '→' ? `→ ${c.t}` : `← ${c.f}`;
    const color = NET_COLORS[c.type] || '#666';
    return `<div class="conn-item">
      <span class="net" style="color:${color}">${c.net}</span>
      <span style="color:#8b949e"> ${c.direction} </span>
      <span class="peer">${c.direction === '→' ? c.t : c.f}</span>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <h2>Detalhes do Componente</h2>
    <div class="detail-ref">${comp.ref}</div>
    <div class="detail-value">${comp.value}</div>
    <div class="detail-mpn">MPN: ${comp.mpn}</div>
    <div class="detail-lcsc">LCSC: <a href="https://www.lcsc.com/product-detail/${comp.lcsc}.html" style="color:#58a6ff" target="_blank">${comp.lcsc}</a></div>
    <div class="detail-pkg">Package: ${comp.pkg}</div>
    <div class="detail-desc">${comp.desc}</div>
    <div class="detail-stage" style="background:${stage.color}22;color:${stage.color};border:1px solid ${stage.color}44">${stage.name}</div>
    <div class="detail-conns">
      <h3>Conexões (${conns.length})</h3>
      ${connHTML || '<div style="color:#8b949e;font-style:italic">Nenhuma conexão mapeada</div>'}
    </div>`;

  document.querySelectorAll('.comp-group').forEach(g => g.classList.remove('selected'));
  const sel = document.querySelector(`.comp-group[data-ref="${ref}"]`);
  if (sel) sel.classList.add('selected');
}

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function truncate(s, n) { return s.length > n ? s.slice(0, n-1) + '…' : s; }

// Zoom/Pan
let transform = {x:0, y:0, scale:1};
const wrap = document.getElementById('canvas-wrap');

function applyTransform() {
  svg.style.transform = `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
  svg.style.transformOrigin = '0 0';
}

let panning = false, panStart = {x:0,y:0}, panOrigin = {x:0,y:0};

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.comp-group')) return;
  panning = true;
  wrap.classList.add('panning');
  panStart = {x: e.clientX, y: e.clientY};
  panOrigin = {x: transform.x, y: transform.y};
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  transform.x = panOrigin.x + (e.clientX - panStart.x);
  transform.y = panOrigin.y + (e.clientY - panStart.y);
  applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; wrap.classList.remove('panning'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  transform.x = mx - (mx - transform.x) * factor;
  transform.y = my - (my - transform.y) * factor;
  transform.scale *= factor;
  applyTransform();
}, {passive: false});

function resetView() { transform={x:0,y:0,scale:1}; applyTransform(); }
function zoomIn() { transform.scale *= 1.2; applyTransform(); }
function zoomOut() { transform.scale /= 1.2; applyTransform(); }
function toggleConns() { showConns = !showConns; renderAll(); }

// Initial fit to window
window.addEventListener('load', () => {
  const ww = wrap.clientWidth;
  const wh = wrap.clientHeight;
  const svgW = 1900, svgH = 1160;
  const scaleX = ww / svgW;
  const scaleY = wh / svgH;
  transform.scale = Math.min(scaleX, scaleY) * 0.97;
  transform.x = (ww - svgW * transform.scale) / 2;
  transform.y = (wh - svgH * transform.scale) / 2;
  applyTransform();
});

renderAll();
</script>
</body>
</html>
